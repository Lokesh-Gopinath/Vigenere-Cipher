<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Vigenère cipher with custom alphabet and encryption/decryption modes.">
    <title>Vigenère Cipher</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Vigenère Cipher</h1>

        <form id="cipherForm">
            <label for="plaintext" id="textLabel">Plaintext</label>
            <input type="text" id="plaintext" required autocomplete="off">

            <label for="keystream">Keystream</label>
            <input type="text" id="keystream" required autocomplete="off">

            <label for="mode">Mode</label>
            <select id="mode">
                <option value="encrypt">Encrypt</option>
                <option value="decrypt">Decrypt</option>
            </select>

            <button type="submit">Run</button>
        </form>

        <div id="result">
            <h2>Result</h2>
            <p id="ciphertext">Enter text and keystream.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
