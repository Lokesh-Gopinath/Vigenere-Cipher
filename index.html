<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A simple Vigenère cipher encryption tool using a custom alphabet.">
    <title>Vigenère Cipher</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Vigenère Cipher</h1>
        <form id="cipherForm">
            <label for="plaintext">Plaintext</label>
            <input type="text" id="plaintext" name="plaintext" required autocomplete="off">
            
            <label for="keystream">Keystream</label>
            <input type="text" id="keystream" name="keystream" required autocomplete="off">
            
            <button type="submit">Encrypt</button>
        </form>
        
        <div id="result">
            <h2>Ciphertext</h2>
            <p id="ciphertext">Enter text and keystream to encrypt.</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
